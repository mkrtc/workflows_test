name: CI/CD pipeline

on:
  push:
    branches:
      - main
  pull_request: 
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25
      - run: npm ci
      - run: npm run test
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        name: Build docker image
      - run: docker buildx build -t my_app:${{ github.sha }} . 
